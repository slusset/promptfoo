    artifact: |
      [jest-worker] WARN retrying failed test file
      FAIL tests/login.spec.ts > login journey > renders dashboard
      AssertionError: expected "Sign in" to equal "Dashboard"
      note: backend emitted 500 during fixture setup but failure is recorded by the test runner
    expected_label: test_failure
  assert:
