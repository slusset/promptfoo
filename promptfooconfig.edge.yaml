# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Compatibility entrypoint for the edge classify-failures suite"

prompts:
  - file://evals/classify-failures/prompts/classify_failure.yaml

providers:
  - id: file://evals/classify-failures/providers/local-llamacpp.js
    label: local-llamacpp
    config:
      base_url_env: LOCAL_LLAMACPP_BASE_URL
      base_url: http://localhost:8080
      model_env: LOCAL_LLAMACPP_MODEL
      model: ggml-org/gemma-4-E4B-it-GGUF:Q8_0
      temperature: 0
      max_tokens: 8

tests: file://evals/classify-failures/tests/edge.yaml
